name: release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: GitHub Actions run ID from the build-artifacts workflow
        required: true
        type: string
      release_name:
        description: Human-friendly title for the release
        required: false
        default: ""
        type: string
      draft:
        description: Create the release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

jobs:
  promote-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve source run metadata
        id: source-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "head_sha=$(gh api repos/${{ github.repository }}/actions/runs/${{ inputs.run_id }} --jq .head_sha)" >> "$GITHUB_OUTPUT"
          echo "html_url=$(gh api repos/${{ github.repository }}/actions/runs/${{ inputs.run_id }} --jq .html_url)" >> "$GITHUB_OUTPUT"
          head_branch="$(gh api repos/${{ github.repository }}/actions/runs/${{ inputs.run_id }} --jq .head_branch)"
          echo "head_branch=$head_branch" >> "$GITHUB_OUTPUT"

          if [[ "$head_branch" != release/* ]]; then
            echo "Expected a source branch matching release/*, got '$head_branch'."
            exit 1
          fi

          tag_name="${head_branch#release/}"
          if [[ -z "$tag_name" ]]; then
            echo "Could not derive a tag name from branch '$head_branch'."
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

          release_name="${{ inputs.release_name }}"
          if [[ -z "$release_name" ]]; then
            release_name="$tag_name"
          fi

          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts from source run
        uses: actions/download-artifact@v4
        with:
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true
          github-token: ${{ github.token }}

      - name: Resolve release files
        id: release-files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          wrapper_archives=(release-artifacts/desktop-*.zip)
          if [[ ${#wrapper_archives[@]} -gt 0 ]]; then
            mkdir -p release-artifacts/extracted
            for archive in "${wrapper_archives[@]}"; do
              target_dir="release-artifacts/extracted/$(basename "$archive" .zip)"
              mkdir -p "$target_dir"
              unzip -o "$archive" -d "$target_dir" >/dev/null
            done
          fi

          files=()

          for path in release-artifacts/**/*.exe release-artifacts/**/*.AppImage release-artifacts/**/*.zip; do
            if [[ -f "$path" ]]; then
              base_name="$(basename "$path")"
              if [[ "$base_name" == desktop-*.zip ]]; then
                continue
              fi
              files+=("$path")
            fi
          done

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files were downloaded."
            find release-artifacts -maxdepth 2 -type f | sort
            exit 1
          fi

          printf '%s\n' "${files[@]}" > release-files.txt
          {
            echo "count=${#files[@]}"
            echo "list_path=release-files.txt"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release from selected artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NAME: ${{ steps.source-run.outputs.release_name }}
          TAG_NAME: ${{ steps.source-run.outputs.tag_name }}
          TARGET_SHA: ${{ steps.source-run.outputs.head_sha }}
          SOURCE_RUN_URL: ${{ steps.source-run.outputs.html_url }}
          SOURCE_BRANCH: ${{ steps.source-run.outputs.head_branch }}
        run: |
          files=()
          while IFS= read -r path; do
            files+=("$path")
          done < release-files.txt

          release_args=()
          if [[ "$DRAFT" == "true" ]]; then
            release_args+=("--draft")
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=("--prerelease")
          fi

          cat <<EOF > release-notes.md
          Automated promotion from the continuous artifact workflow.

          - Source workflow run: $SOURCE_RUN_URL
          - Source branch: $SOURCE_BRANCH
          - Release tag: $TAG_NAME
          - Source commit: $TARGET_SHA
          - Included artifacts: ${#files[@]}
          EOF

          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md \
            "${release_args[@]}" \
            "${files[@]}"

      - name: Add release summary
        shell: bash
        env:
          TAG_NAME: ${{ steps.source-run.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.source-run.outputs.release_name }}
          RUN_ID: ${{ inputs.run_id }}
          SOURCE_BRANCH: ${{ steps.source-run.outputs.head_branch }}
          SOURCE_COMMIT: ${{ steps.source-run.outputs.head_sha }}
          FILE_COUNT: ${{ steps.release-files.outputs.count }}
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release created

          - Tag: $TAG_NAME
          - Title: $RELEASE_NAME
          - Source branch: $SOURCE_BRANCH
          - Source run: $RUN_ID
          - Source commit: $SOURCE_COMMIT
          - Attached files: $FILE_COUNT
          EOF
