name: build-artifacts

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build workspace
        run: bun run build

  package-desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            script: package:win
            asset_glob: "*.exe"
          - platform: macos
            runner: macos-latest
            script: package:mac
            asset_glob: "*.zip"
          - platform: linux
            runner: ubuntu-latest
            script: package:linux
            asset_glob: "*.AppImage"
    runs-on: ${{ matrix.runner }}
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package desktop app
        run: bun run --cwd apps/desktop ${{ matrix.script }}

      - name: Resolve packaged asset
        id: packaged-asset
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          matches=(apps/desktop/artifacts/${{ matrix.asset_glob }})
          if [[ ${#matches[@]} -ne 1 ]]; then
            echo "Expected exactly one packaged file for ${{ matrix.platform }}, found ${#matches[@]}." >&2
            printf '%s\n' "${matches[@]}" >&2
            exit 1
          fi

          echo "path=${matches[0]}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${matches[0]}")" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ github.sha }}
          path: ${{ steps.packaged-asset.outputs.path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Add workflow summary
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          FILE_NAME: ${{ steps.packaged-asset.outputs.name }}
          ARTIFACT_NAME: desktop-${{ matrix.platform }}-${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          {
            echo "## Packaged artifact"
            echo
            echo "- Platform: \`$PLATFORM\`"
            echo "- File: \`$FILE_NAME\`"
            echo "- Workflow artifact: \`$ARTIFACT_NAME\`"
            echo "- Release branch: \`$RELEASE_BRANCH\`"
            echo "- Derived tag: \`${RELEASE_BRANCH#release/}\`"
            echo "- Run ID: \`$RUN_ID\`"
            echo "- Commit: \`$COMMIT_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
