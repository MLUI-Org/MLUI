name: build-artifacts

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build workspace
        run: bun run build

  package-desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            script: package:win
            asset_glob: "*.exe"
          - platform: macos
            runner: macos-latest
            script: package:mac
            asset_glob: "*.zip"
          - platform: linux
            runner: ubuntu-latest
            script: package:linux
            asset_glob: "*.AppImage"
    runs-on: ${{ matrix.runner }}
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package desktop app
        run: bun run --cwd apps/desktop ${{ matrix.script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ github.sha }}
          path: apps/desktop/artifacts/${{ matrix.asset_glob }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Add workflow summary
        shell: bash
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Packaged artifact

          - Platform: `${{ matrix.platform }}`
          - Artifact: `desktop-${{ matrix.platform }}-${{ github.sha }}`
          - Run ID: `${{ github.run_id }}`
          - Commit: `${{ github.sha }}`
          EOF
